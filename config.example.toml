# Terminal Emulator - Configuración de ejemplo

[terminal]
# Número de líneas en el scrollback
scrollback_lines = 10000

[font]
# Tamaño de fuente en píxeles
size = 16

[colors]
# Colores por defecto (paleta básica)
foreground = [229, 229, 229]
background = [0, 0, 0]

[shell]
# Shell por defecto (vacío = usar $SHELL o /bin/bash)
command = ""

[rendering]
# Habilita detección inteligente de contenido (logs, JSON, tablas, stack traces)
# Útil en modo interactivo, desactivar para scripts o pipelines
smart_detection = true

# Habilita sintaxis coloreada para JSON
json_colors = true

# Habilita colores automáticos para logs (INFO, WARN, ERROR, etc.)
log_colors = true

# Habilita detección y formateo de tablas ASCII
table_detection = true
